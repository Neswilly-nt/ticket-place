spring:
  application:
    name: ticket-place
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/ticketplace_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
